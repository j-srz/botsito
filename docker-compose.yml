version: '3.8'

services:
  rexbot:
    build: .
    container_name: rexbot_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      # Credenciales de sesión WhatsApp (crítico — no perder)
      - auth_data:/app/auth_info
      # Base de datos JSON
      - db_data:/app/data
      # Medios compartidos
      - ./media:/app/media
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('fs').accessSync('/app/auth_info', require('fs').constants.F_OK)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  auth_data:
    driver: local
  db_data:
    driver: local
